<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc">
  <title id="title">Unraid Icon Manager interface preview</title><desc id="desc">A dark dashboard with icon editing controls and Docker container cards.</desc>
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#153a32"/><stop offset="1" stop-color="#081412"/></linearGradient></defs>
  <rect width="1200" height="690" fill="url(#g)"/><text x="70" y="76" fill="#80c9a0" font-family="Arial" font-size="15" font-weight="bold">UNRAID · DOCKER MANAGER</text><text x="70" y="135" fill="#f4f8f7" font-family="Arial" font-size="52" font-weight="bold">Icon Manager</text><text x="70" y="168" fill="#95aaa4" font-family="Arial" font-size="19">批量整理容器图标，不重启业务容器。</text>
  <rect x="70" y="205" width="1060" height="142" rx="14" fill="#122822" stroke="#29473f"/><text x="96" y="245" fill="#f4f8f7" font-family="Arial" font-size="18" font-weight="bold">设置图标</text><rect x="96" y="263" width="630" height="48" rx="8" fill="#0b1b17" stroke="#3c5d53"/><text x="112" y="294" fill="#95aaa4" font-family="Arial" font-size="15">https://… 或 /mnt/user/appdata/…</text><rect x="760" y="237" width="112" height="82" rx="10" fill="#0b1b17"/><circle cx="816" cy="278" r="24" fill="#a7f3c5"/><text x="897" y="285" fill="#a7f3c5" font-family="Arial" font-size="16" font-weight="bold">应用到 3 个容器</text>
  <text x="70" y="400" fill="#f4f8f7" font-family="Arial" font-size="21" font-weight="bold">容器</text>
