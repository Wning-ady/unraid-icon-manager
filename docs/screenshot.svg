<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc">
  <title id="title">Unraid Icon Manager interface preview</title>
  <desc id="desc">A Docker Copilot-inspired dashboard with a navy sidebar, container statistics, icon controls and Docker cards.</desc>
  <defs><linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#15283e"/><stop offset="1" stop-color="#102035"/></linearGradient><linearGradient id="logo" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#36baf0"/><stop offset="1" stop-color="#5368ef"/></linearGradient></defs>
  <rect width="1200" height="690" fill="#0b1525"/><rect width="225" height="690" fill="#182438"/>
  <rect x="20" y="24" width="34" height="34" rx="10" fill="url(#logo)"/><path d="M29 41l8-8 8 8-8 8z" fill="none" stroke="#fff" stroke-width="2"/><text x="66" y="39" fill="#fff" font-family="Arial" font-size="16" font-weight="bold">Icon Manager</text><text x="66" y="55" fill="#8fa3bb" font-family="Arial" font-size="10">for Unraid</text>
  <g font-family="Arial" font-size="14"><rect x="14" y="100" width="197" height="44" rx="8" fill="#2d405b"/><text x="35" y="127" fill="#fff">▦　容器图标</text><text x="35" y="180" fill="#b6c3d2">≡　分组与记录</text><text x="35" y="226" fill="#b6c3d2">♡　关于项目</text></g>
  <circle cx="27" cy="637" r="4" fill="#55dda6"/><text x="39" y="641" fill="#adbdce" font-family="Arial" font-size="11">Docker Manager 已连接</text><text x="22" y="662" fill="#7388a0" font-family="Arial" font-size="10">v0.1.6 · 不重启业务容器</text>
  <text x="272" y="45" fill="#58c9f3" font-family="Arial" font-size="11" font-weight="bold" letter-spacing="2">DOCKER MANAGEMENT</text><text x="272" y="82" fill="#eef6ff" font-family="Arial" font-size="31" font-weight="bold">容器图标总览</text><line x1="272" y1="104" x2="1150" y2="104" stroke="#20354d"/>
  <g font-family="Arial"><g transform="translate(272 126)"><rect width="206" height="68" rx="10" fill="#12243a" stroke="#223a54"/><text x="16" y="25" fill="#90a9c2" font-size="11">总容器</text><text x="16" y="52" fill="#eef6ff" font-size="22" font-weight="bold">42</text></g><g transform="translate(491 126)"><rect width="206" height="68" rx="10" fill="#12243a" stroke="#223a54"/><text x="16" y="25" fill="#90a9c2" font-size="11">运行中</text><text x="16" y="52" fill="#64e6aa" font-size="22" font-weight="bold">32</text></g><g transform="translate(710 126)"><rect width="206" height="68" rx="10" fill="#12243a" stroke="#223a54"/><text x="16" y="25" fill="#90a9c2" font-size="11">已停止</text><text x="16" y="52" fill="#a8b8ca" font-size="22" font-weight="bold">10</text></g><g transform="translate(929 126)"><rect width="221" height="68" rx="10" fill="#12243a" stroke="#223a54"/><text x="16" y="25" fill="#90a9c2" font-size="11">已有模板</text><text x="16" y="52" fill="#5ed2f5" font-size="22" font-weight="bold">17</text></g></g>
  <rect x="272" y="214" width="878" height="47" rx="9" fill="#101f33" stroke="#203950"/><text x="290" y="243" fill="#71869e" font-family="Arial" font-size="13">搜索容器或镜像…</text><rect x="988" y="225" width="70" height="25" rx="7" fill="#1a2c43"/><text x="1003" y="242" fill="#bcd0e4" font-family="Arial" font-size="10">全选结果</text><rect x="1067" y="225" width="66" height="25" rx="7" fill="#1a2c43"/><text x="1083" y="242" fill="#bcd0e4" font-family="Arial" font-size="10">清空选择</text>
  <rect x="272" y="279" width="878" height="126" rx="11" fill="#101f33" stroke="#203950"/><text x="290" y="307" fill="#edf5ff" font-family="Arial" font-size="15" font-weight="bold">批量设置图标</text><rect x="290" y="323" width="570" height="39" rx="7" fill="#0d1b2d" stroke="#29445e"/><text x="304" y="348" fill="#6e849d" font-family="Arial" font-size="12">https://…</text><rect x="290" y="370" width="570" height="24" rx="6" fill="#22a6d9"/><text x="510" y="387" fill="#061521" font-family="Arial" font-size="11" font-weight="bold">应用到 3 个容器</text><rect x="882" y="296" width="248" height="92" rx="9" fill="#0c1a2b" stroke="#31506b" stroke-dasharray="4 3"/><circle cx="1006" cy="337" r="22" fill="#1b3148"/><text x="983" y="374" fill="#90a5bb" font-family="Arial" font-size="11">图标预览</text>
  <text x="272" y="445" fill="#edf5ff" font-family="Arial" font-size="17" font-weight="bold">当前 Docker 容器</text><text x="272" y="465" fill="#8da5bd" font-family="Arial" font-size="11">点击任意容器直接更换图标</text>
  <g font-family="Arial"><g transform="translate(272 483)"><rect width="276" height="112" rx="11" fill="url(#card)" stroke="#42bce7"/><rect x="17" y="22" width="46" height="46" rx="11" fill="#0c1a2b" stroke="#2d4d67"/><text x="31" y="52" fill="#5ad1f4" font-size="22">◇</text><text x="78" y="38" fill="#edf5ff" font-size="15" font-weight="bold">plex</text><rect x="208" y="21" width="53" height="21" rx="11" fill="#133f35"/><text x="219" y="35" fill="#77ebbc" font-size="9">运行中</text><text x="78" y="58" fill="#9cb1c5" font-size="10">lscr.io/linuxserver/plex</text><text x="78" y="79" fill="#73e2b4" font-size="9">已关联 Unraid 模板</text></g><g transform="translate(565 483)"><rect width="276" height="112" rx="11" fill="url(#card)" stroke="#243c55"/><rect x="17" y="22" width="46" height="46" rx="11" fill="#0c1a2b" stroke="#2d4d67"/><text x="31" y="52" fill="#5ad1f4" font-size="22">◇</text><text x="78" y="38" fill="#edf5ff" font-size="15" font-weight="bold">radarr</text><rect x="208" y="21" width="53" height="21" rx="11" fill="#133f35"/><text x="219" y="35" fill="#77ebbc" font-size="9">运行中</text><text x="78" y="58" fill="#9cb1c5" font-size="10">lscr.io/linuxserver/radarr</text><text x="78" y="79" fill="#73e2b4" font-size="9">Compose · 已有关联模板</text></g><g transform="translate(858 483)"><rect width="292" height="112" rx="11" fill="url(#card)" stroke="#243c55"/><rect x="17" y="22" width="46" height="46" rx="11" fill="#0c1a2b" stroke="#2d4d67"/><text x="31" y="52" fill="#5ad1f4" font-size="22">◇</text><text x="78" y="38" fill="#edf5ff" font-size="15" font-weight="bold">worker</text><rect x="224" y="21" width="53" height="21" rx="11" fill="#25364a"/><text x="235" y="35" fill="#b7c9db" font-size="9">已停止</text><text x="78" y="58" fill="#9cb1c5" font-size="10">example/worker:latest</text><text x="78" y="79" fill="#f3c572" font-size="9">首次保存将创建元数据模板</text></g></g>
  <rect x="272" y="616" width="878" height="45" rx="10" fill="#101f33" stroke="#203950"/><text x="291" y="644" fill="#e7f0ff" font-family="Arial" font-size="13" font-weight="bold">分组与最近变更</text>
</svg>
